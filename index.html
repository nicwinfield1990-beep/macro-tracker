<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nic's Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111210;
  --surface: #1a1c19;
  --surface2: #212420;
  --border: #2c2e2a;
  --text: #e8e6e0;
  --muted: #6b6b67;
  --muted2: #3e3e3a;
  --protein: #ff7043;
  --carbs: #ffc107;
  --fat: #64b5f6;
  --green: #66bb6a;
  --accent: #a5d6a7;
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { height:100%; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  max-width: 430px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── NAV ── */
.nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding-top: env(safe-area-inset-top, 0px);
}

.nav-btn {
  flex: 1;
  padding: 13px 0 11px;
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  user-select: none;
}

.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── SCREENS ── */
.screens { flex: 1; overflow: hidden; position: relative; }

.screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
}

.screen.active { display: flex; }

/* ════════════════════════════════
   TODAY SCREEN — chat style
════════════════════════════════ */
.today-header {
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.today-date {
  font-family: 'Fraunces', serif;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* Macro strip */
.macro-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.ms-item { text-align: center; }

.ms-val {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 500;
  line-height: 1;
}

.ms-label {
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 2px;
}

.ms-bar {
  height: 3px;
  background: var(--border);
  border-radius: 999px;
  margin-top: 4px;
  overflow: hidden;
}

.ms-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.4s ease;
}

/* Chat area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}

/* Messages */
.msg {
  display: flex;
  gap: 8px;
  animation: msgIn 0.25s ease both;
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 2px;
}

.msg-bubble {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 13px;
  line-height: 1.55;
}

.msg.ai .msg-bubble {
  background: var(--surface2);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.msg.user .msg-bubble {
  background: #2a3a2a;
  color: var(--text);
  border-bottom-right-radius: 4px;
}

/* Logged food card inside AI bubble */
.food-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  margin-top: 8px;
  font-size: 12px;
}

.food-card-name {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  margin-bottom: 6px;
  color: var(--text);
}

.food-card-macros {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.ftag { font-size: 10px; letter-spacing: 0.04em; }
.ftag.p { color: var(--protein); }
.ftag.c { color: var(--carbs); }
.ftag.f { color: var(--fat); }
.ftag.k { color: var(--accent); }

.food-card-note {
  font-size: 10px;
  color: var(--muted);
  margin-top: 5px;
  font-style: italic;
  line-height: 1.5;
}

.undo-btn {
  font-size: 10px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  margin-top: 6px;
  text-decoration: underline;
  padding: 0;
}

/* Thinking */
.thinking-dots {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 10px 14px;
  background: var(--surface2);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}

.thinking-dots span {
  width: 5px; height: 5px;
  background: var(--muted);
  border-radius: 50%;
  animation: throb 1.2s ease-in-out infinite;
}

.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes throb {
  0%,60%,100% { opacity:0.2; transform:scale(0.8); }
  30% { opacity:1; transform:scale(1); }
}

/* Input bar */
.input-bar {
  padding: 10px 12px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
  background: var(--surface);
}

.chat-input {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 22px;
  padding: 10px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--text);
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 130px;
  line-height: 1.4;
  color-scheme: dark;
  transition: border-color 0.2s;
}

.chat-input::placeholder { color: var(--muted); }
.chat-input:focus { border-color: var(--accent); }

.send-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  color: #111;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s, transform 0.1s;
}

.send-btn:active { transform: scale(0.9); opacity: 0.8; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ════════════════════════════════
   HISTORY SCREEN
════════════════════════════════ */
.history-screen {
  overflow-y: auto;
  padding: 16px;
  gap: 12px;
  display: none;
  flex-direction: column;
}

.history-screen.active { display: flex; }

.history-day {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.history-day-header {
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
}

.history-day-date {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 500;
}

.history-day-cal {
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.04em;
}

.history-day-macros {
  padding: 0 16px 14px;
  display: flex;
  gap: 12px;
  font-size: 11px;
}

.history-day-entries {
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: none;
}

.history-day-entries.open { display: block; }

.history-entry {
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
}

.history-entry:last-child { border-bottom: none; }
.history-entry-name { color: var(--text); flex: 1; }

.empty-history {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-history .big { font-family: 'Fraunces', serif; font-size: 48px; margin-bottom: 12px; }
.empty-history p { font-size: 12px; line-height: 1.7; }

/* ════════════════════════════════
   WEIGHT SCREEN
════════════════════════════════ */
.weight-screen {
  overflow-y: auto;
  padding: 16px;
  gap: 14px;
  display: none;
  flex-direction: column;
}

.weight-screen.active { display: flex; }

.weight-input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.weight-input-card h3 {
  font-family: 'Fraunces', serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.weight-entry-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.weight-input-wrap { flex: 1; }

.weight-input-wrap label {
  display: block;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.weight-input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  color: var(--text);
  outline: none;
  color-scheme: dark;
  text-align: center;
  transition: border-color 0.2s;
}

.weight-input:focus { border-color: var(--accent); }

.log-weight-btn {
  padding: 12px 20px;
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
}

.log-weight-btn:active { opacity: 0.8; }

/* Weight stats */
.weight-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.wstat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}

.wstat-val {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 500;
  line-height: 1;
  margin-bottom: 4px;
}

.wstat-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Weight chart */
.weight-chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.weight-chart-card h3 {
  font-family: 'Fraunces', serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

canvas#weightChart {
  width: 100% !important;
  height: 160px !important;
}

/* Weight log list */
.weight-log-list {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.weight-log-list h3 {
  font-family: 'Fraunces', serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.wlog-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}

.wlog-row:last-child { border-bottom: none; }
.wlog-date { color: var(--muted); }
.wlog-val { font-family: 'Fraunces', serif; font-size: 16px; }
.wlog-diff { font-size: 10px; }

/* ════════════════════════════════
   SETTINGS SCREEN
════════════════════════════════ */
.settings-screen {
  overflow-y: auto;
  padding: 16px;
  gap: 12px;
  display: none;
  flex-direction: column;
}

.settings-screen.active { display: flex; }

.settings-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.settings-card h3 {
  font-family: 'Fraunces', serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.field { margin-bottom: 12px; }

.field label {
  display: block;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 11px 13px;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--text);
  outline: none;
  color-scheme: dark;
  transition: border-color 0.2s;
}

.field input:focus { border-color: var(--accent); }

.tgt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.primary-btn {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
  letter-spacing: 0.04em;
}

.primary-btn:active { opacity: 0.8; }

.ghost-btn {
  width: 100%;
  padding: 11px;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  margin-top: 8px;
}

/* Prompt banner */
.prompt-banner {
  background: #1e2a1e;
  border: 1px solid #2e4a2e;
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--accent);
  line-height: 1.5;
  display: none;
  margin: 0 16px 8px;
  flex-shrink: 0;
  cursor: pointer;
}

.prompt-banner.show { display: block; }
.prompt-banner strong { display: block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; opacity: 0.7; }

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 12px;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s ease;
  white-space: nowrap;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes msgIn {
  from { opacity:0; transform: translateY(8px); }
  to { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-btn active" onclick="switchTab('today')">Today</div>
  <div class="nav-btn" onclick="switchTab('history')">History</div>
  <div class="nav-btn" onclick="switchTab('weight')">Weight</div>
  <div class="nav-btn" onclick="switchTab('settings')">Settings</div>
</div>

<!-- SCREENS -->
<div class="screens">

  <!-- ── TODAY ── -->
  <div class="screen active" id="screen-today" style="flex-direction:column">

    <div class="today-header">
      <div class="today-date" id="todayDate"></div>
      <div class="macro-strip" id="macroStrip">
        <div class="ms-item">
          <div class="ms-val" id="msKcal">0</div>
          <div class="ms-label">kcal</div>
          <div class="ms-bar"><div class="ms-bar-fill" id="barKcal" style="width:0%;background:var(--accent)"></div></div>
        </div>
        <div class="ms-item">
          <div class="ms-val" id="msProt" style="color:var(--protein)">0g</div>
          <div class="ms-label">protein</div>
          <div class="ms-bar"><div class="ms-bar-fill" id="barProt" style="width:0%;background:var(--protein)"></div></div>
        </div>
        <div class="ms-item">
          <div class="ms-val" id="msCarbs" style="color:var(--carbs)">0g</div>
          <div class="ms-label">carbs</div>
          <div class="ms-bar"><div class="ms-bar-fill" id="barCarbs" style="width:0%;background:var(--carbs)"></div></div>
        </div>
        <div class="ms-item">
          <div class="ms-val" id="msFat" style="color:var(--fat)">0g</div>
          <div class="ms-label">fat</div>
          <div class="ms-bar"><div class="ms-bar-fill" id="barFat" style="width:0%;background:var(--fat)"></div></div>
        </div>
      </div>
    </div>

    <!-- Smart prompt banner -->
    <div class="prompt-banner" id="promptBanner" onclick="usePrompt()">
      <strong id="promptLabel">Reminder</strong>
      <span id="promptText"></span>
    </div>

    <!-- Chat -->
    <div class="chat-area" id="chatArea"></div>

    <!-- Input -->
    <div class="input-bar">
      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="What did you eat? Just type naturally…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>

  </div>

  <!-- ── HISTORY ── -->
  <div class="screen history-screen" id="screen-history"></div>

  <!-- ── WEIGHT ── -->
  <div class="screen weight-screen" id="screen-weight">

    <div class="weight-input-card">
      <h3>Log Weight</h3>
      <div class="weight-entry-row">
        <div class="weight-input-wrap">
          <label>Today's weight (kg)</label>
          <input type="number" class="weight-input" id="weightInput" placeholder="87.5" step="0.1" inputmode="decimal">
        </div>
        <button class="log-weight-btn" onclick="logWeight()">Log</button>
      </div>
    </div>

    <div class="weight-stats" id="weightStats"></div>

    <div class="weight-chart-card" id="weightChartWrap" style="display:none">
      <h3>Progress</h3>
      <canvas id="weightChart"></canvas>
    </div>

    <div class="weight-log-list" id="weightLogList"></div>

  </div>

  <!-- ── SETTINGS ── -->
  <div class="screen settings-screen" id="screen-settings">

    <div class="settings-card">
      <h3>Daily Targets</h3>
      <div class="tgt-grid">
        <div class="field"><label>Calories</label><input type="number" id="tCal" placeholder="1600" inputmode="decimal"></div>
        <div class="field"><label>Protein (g)</label><input type="number" id="tProt" placeholder="150" inputmode="decimal"></div>
        <div class="field"><label>Carbs (g)</label><input type="number" id="tCarbs" placeholder="130" inputmode="decimal"></div>
        <div class="field"><label>Fat (g)</label><input type="number" id="tFat" placeholder="55" inputmode="decimal"></div>
      </div>
      <button class="primary-btn" onclick="saveTargets()">Save Targets</button>
    </div>

    <div class="settings-card">
      <h3>Starting Weight</h3>
      <div class="field"><label>Starting weight (kg) — for tracking total loss</label><input type="number" id="startWeight" placeholder="104" inputmode="decimal" step="0.1"></div>
      <button class="primary-btn" onclick="saveStartWeight()">Save</button>
    </div>

    <div class="settings-card">
      <h3>Meal Presets</h3>
      <p style="font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:12px">Save regular meals — just type the name when logging and AI will use these exact macros.</p>
      <div id="presetListSettings"></div>
      <div class="field" style="margin-top:10px"><label>Name</label><input type="text" id="pName" placeholder="e.g. Meal Prep Lunch"></div>
      <div class="field"><label>Describe macros</label><input type="text" id="pDesc" placeholder="e.g. 600 kcal, 60g protein, 55g carbs, 20g fat"></div>
      <button class="primary-btn" onclick="addPreset()">Add Preset</button>
    </div>

    <div class="settings-card">
      <h3>Data</h3>
      <button class="ghost-btn" onclick="clearToday()">Clear today's food log</button>
    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════
const todayKey = () => 'foodlog_' + new Date().toISOString().slice(0,10);
const getLog = () => { try { return JSON.parse(localStorage.getItem(todayKey())) || []; } catch { return []; } };
const saveLog = l => localStorage.setItem(todayKey(), JSON.stringify(l));
const getTargets = () => { try { return JSON.parse(localStorage.getItem('targets3')) || {cal:1600,prot:150,carbs:130,fat:55}; } catch { return {cal:1600,prot:150,carbs:130,fat:55}; } };
const saveTargetsStore = t => localStorage.setItem('targets3', JSON.stringify(t));
const getWeightLog = () => { try { return JSON.parse(localStorage.getItem('weightlog')) || []; } catch { return []; } };
const saveWeightLog = l => localStorage.setItem('weightlog', JSON.stringify(l));
const getPresets = () => { try { return JSON.parse(localStorage.getItem('presets3')) || [{name:'Meal Prep Lunch',desc:'600 kcal, 60g protein, 55g carbs, 20g fat'}]; } catch { return []; } };
const savePresets = p => localStorage.setItem('presets3', JSON.stringify(p));
const getStartWeight = () => parseFloat(localStorage.getItem('startweight') || '0');

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
let chatHistory = []; // for context
let thinkingEl = null;

window.onload = () => {
  setDateHeader();
  loadSettingsUI();
  updateMacroStrip();
  restoreChat();
  checkSmartPrompt();
  setInterval(checkSmartPrompt, 60000);
};

function setDateHeader() {
  const d = new Date();
  document.getElementById('todayDate').textContent =
    d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(id) {
  document.querySelectorAll('.nav-btn').forEach((b,i) =>
    b.classList.toggle('active', ['today','history','weight','settings'][i] === id));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  if (id === 'history') renderHistory();
  if (id === 'weight') renderWeight();
  if (id === 'settings') renderPresetList();
}

// ═══════════════════════════════════════
// SMART PROMPTS
// ═══════════════════════════════════════
let promptUsed = false;
let lastPromptType = null;

function checkSmartPrompt() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const banner = document.getElementById('promptBanner');
  const label = document.getElementById('promptLabel');
  const text = document.getElementById('promptText');
  const wlog = getWeightLog();
  const todayStr = now.toISOString().slice(0,10);
  const hasWeighedToday = wlog.some(w => w.date === todayStr);
  const log = getLog();

  // Morning weigh-in: 7am–10am
  if (h >= 7 && h < 10 && !hasWeighedToday) {
    label.textContent = '⚖️ Morning weigh-in';
    text.textContent = 'Have you stepped on the scales? Log your weight to keep your streak going.';
    lastPromptType = 'weight';
    banner.classList.add('show');
    return;
  }

  // Lunch prompt: 13:25–14:30
  if (h === 13 && m >= 25 || (h === 14 && m <= 30)) {
    const hasLunch = log.some(e => {
      const eh = new Date(e.time).getHours();
      return eh >= 12 && eh <= 15;
    });
    if (!hasLunch) {
      label.textContent = '🥗 Lunch time';
      text.textContent = "It's gone half one — what did you have for lunch?";
      lastPromptType = 'lunch';
      banner.classList.add('show');
      return;
    }
  }

  // Dinner prompt: 19:00–20:30
  if (h >= 19 && h < 21) {
    const hasDinner = log.some(e => {
      const eh = new Date(e.time).getHours();
      return eh >= 18;
    });
    if (!hasDinner) {
      label.textContent = '🍽️ Dinner time';
      text.textContent = "What did you have for dinner tonight?";
      lastPromptType = 'dinner';
      banner.classList.add('show');
      return;
    }
  }

  banner.classList.remove('show');
}

function usePrompt() {
  document.getElementById('promptBanner').classList.remove('show');
  if (lastPromptType === 'weight') {
    switchTab('weight');
    document.getElementById('weightInput').focus();
  } else {
    document.getElementById('chatInput').focus();
    if (lastPromptType === 'lunch') document.getElementById('chatInput').value = '';
    if (lastPromptType === 'dinner') document.getElementById('chatInput').value = '';
  }
}

// ═══════════════════════════════════════
// CHAT
// ═══════════════════════════════════════
function restoreChat() {
  const log = getLog();
  if (!log.length) {
    appendAIMessage("Hey Nic 👋 Just tell me what you've eaten — as much or as little detail as you have. I'll work out the macros.");
    return;
  }
  // Reconstruct chat from log
  log.forEach(entry => {
    appendUserBubble(entry.input);
    appendFoodCard(entry);
  });
  scrollChat();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  appendUserBubble(text);
  showThinking();

  const presets = getPresets();
  const presetCtx = presets.length
    ? `\n\nUser's saved meal presets:\n${presets.map(p=>`"${p.name}": ${p.desc}`).join('\n')}\nIf the input matches a preset name, use those exact macros.`
    : '';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a nutrition tracking assistant. The user describes food in natural language. 
        
Respond ONLY with valid JSON — no markdown, no code fences, nothing else.

JSON structure:
{
  "name": "concise meal name (5 words max)",
  "calories": integer,
  "protein": integer,
  "carbs": integer,
  "fat": integer,
  "note": "one short sentence explaining your estimate"
}

Rules:
- calories = (protein × 4) + (carbs × 4) + (fat × 9)
- Use real UK nutritional data
- If portions are vague, use sensible standard UK serving sizes
- Be accurate — this is used for serious fat loss tracking${presetCtx}`,
        messages: [{ role: 'user', content: text }]
      })
    });

    const data = await res.json();
    const raw = data?.content?.find(b => b.type === 'text')?.text || '';

    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch { throw new Error('parse fail'); }

    removeThinking();

    // Save to log
    const entry = {
      id: Date.now(),
      input: text,
      name: parsed.name,
      cal: parsed.calories,
      prot: parsed.protein,
      carbs: parsed.carbs,
      fat: parsed.fat,
      note: parsed.note,
      time: new Date().toISOString()
    };

    const log = getLog();
    log.push(entry);
    saveLog(log);

    appendFoodCard(entry);
    updateMacroStrip();
    checkSmartPrompt();

  } catch(err) {
    removeThinking();
    appendAIMessage("Sorry, something went wrong — try again in a moment.");
    console.error(err);
  }

  document.getElementById('sendBtn').disabled = false;
  scrollChat();
}

function appendUserBubble(text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-avatar">N</div><div class="msg-bubble">${escHtml(text)}</div>`;
  area.appendChild(div);
  scrollChat();
}

function appendAIMessage(text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-avatar">🌿</div><div class="msg-bubble">${escHtml(text)}</div>`;
  area.appendChild(div);
  scrollChat();
}

function appendFoodCard(entry) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-avatar">🌿</div>
    <div class="msg-bubble">
      Logged ✓
      <div class="food-card">
        <div class="food-card-name">${escHtml(entry.name)}</div>
        <div class="food-card-macros">
          <span class="ftag k">⚡ ${entry.cal} kcal</span>
          <span class="ftag p">P ${entry.prot}g</span>
          <span class="ftag c">C ${entry.carbs}g</span>
          <span class="ftag f">F ${entry.fat}g</span>
        </div>
        ${entry.note ? `<div class="food-card-note">${escHtml(entry.note)}</div>` : ''}
        <button class="undo-btn" onclick="undoEntry(${entry.id}, this)">Undo</button>
      </div>
    </div>`;
  area.appendChild(div);
  scrollChat();
}

function showThinking() {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'thinkingMsg';
  wrap.innerHTML = `<div class="msg-avatar">🌿</div><div class="thinking-dots"><span></span><span></span><span></span></div>`;
  area.appendChild(wrap);
  thinkingEl = wrap;
  scrollChat();
}

function removeThinking() {
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
}

function undoEntry(id, btn) {
  const log = getLog().filter(e => e.id !== id);
  saveLog(log);
  updateMacroStrip();
  // remove the whole AI bubble
  btn.closest('.msg').remove();
  // also remove the user bubble above it (tricky — just show toast)
  showToast('Entry removed');
}

function scrollChat() {
  const area = document.getElementById('chatArea');
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

// ═══════════════════════════════════════
// MACRO STRIP
// ═══════════════════════════════════════
function updateMacroStrip() {
  const log = getLog();
  const t = getTargets();
  const tot = log.reduce((a,e) => ({cal:a.cal+e.cal,prot:a.prot+e.prot,carbs:a.carbs+e.carbs,fat:a.fat+e.fat}),{cal:0,prot:0,carbs:0,fat:0});

  document.getElementById('msKcal').textContent = Math.round(tot.cal);
  document.getElementById('msProt').textContent = Math.round(tot.prot)+'g';
  document.getElementById('msCarbs').textContent = Math.round(tot.carbs)+'g';
  document.getElementById('msFat').textContent = Math.round(tot.fat)+'g';

  const pct = (v,m) => Math.min(100,Math.round(v/m*100))+'%';
  document.getElementById('barKcal').style.width = pct(tot.cal,t.cal);
  document.getElementById('barProt').style.width = pct(tot.prot,t.prot);
  document.getElementById('barCarbs').style.width = pct(tot.carbs,t.carbs);
  document.getElementById('barFat').style.width = pct(tot.fat,t.fat);
}

// ═══════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════
function renderHistory() {
  const screen = document.getElementById('screen-history');

  // Gather all log days from localStorage
  const days = [];
  for (let i=0; i<localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('foodlog_')) {
      const date = key.replace('foodlog_','');
      try {
        const entries = JSON.parse(localStorage.getItem(key)) || [];
        if (entries.length) days.push({date, entries});
      } catch {}
    }
  }

  days.sort((a,b) => b.date.localeCompare(a.date));

  if (!days.length) {
    screen.innerHTML = `<div class="empty-history"><div class="big">📋</div><p>No history yet.<br>Start logging today and it'll appear here.</p></div>`;
    return;
  }

  screen.innerHTML = days.map(day => {
    const tot = day.entries.reduce((a,e)=>({cal:a.cal+e.cal,prot:a.prot+e.prot,carbs:a.carbs+e.carbs,fat:a.fat+e.fat}),{cal:0,prot:0,carbs:0,fat:0});
    const d = new Date(day.date + 'T12:00:00');
    const label = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    const id = 'day_' + day.date.replace(/-/g,'');
    return `
    <div class="history-day">
      <div class="history-day-header" onclick="toggleDay('${id}')">
        <div class="history-day-date">${label}</div>
        <div class="history-day-cal">${Math.round(tot.cal)} kcal</div>
      </div>
      <div class="history-day-macros">
        <span class="ftag p">P ${Math.round(tot.prot)}g</span>
        <span class="ftag c">C ${Math.round(tot.carbs)}g</span>
        <span class="ftag f">F ${Math.round(tot.fat)}g</span>
      </div>
      <div class="history-day-entries" id="${id}">
        ${day.entries.map(e=>`
          <div class="history-entry">
            <div class="history-entry-name">${escHtml(e.name)}</div>
            <span style="color:var(--accent);font-size:11px">${Math.round(e.cal)}</span>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleDay(id) {
  document.getElementById(id).classList.toggle('open');
}

// ═══════════════════════════════════════
// WEIGHT
// ═══════════════════════════════════════
function logWeight() {
  const val = parseFloat(document.getElementById('weightInput').value);
  if (!val || val < 30 || val > 300) { showToast('Enter a valid weight'); return; }
  const todayStr = new Date().toISOString().slice(0,10);
  const log = getWeightLog().filter(w => w.date !== todayStr);
  log.push({ date: todayStr, weight: val });
  log.sort((a,b) => a.date.localeCompare(b.date));
  saveWeightLog(log);
  document.getElementById('weightInput').value = '';
  renderWeight();
  checkSmartPrompt();
  showToast('Weight logged ✓');
}

function renderWeight() {
  const log = getWeightLog();
  const startW = getStartWeight() || 104;

  // Stats
  const statsEl = document.getElementById('weightStats');
  if (log.length) {
    const latest = log[log.length-1].weight;
    const lost = startW - latest;
    const prev = log.length > 1 ? log[log.length-2].weight : latest;
    const change = latest - prev;
    const changeStr = change === 0 ? '—' : (change > 0 ? '+' : '') + change.toFixed(1) + 'kg';
    const changeCol = change > 0 ? 'var(--protein)' : change < 0 ? 'var(--green)' : 'var(--muted)';

    statsEl.innerHTML = `
      <div class="wstat">
        <div class="wstat-val">${latest.toFixed(1)}</div>
        <div class="wstat-label">Current kg</div>
      </div>
      <div class="wstat">
        <div class="wstat-val" style="color:var(--green)">-${lost.toFixed(1)}</div>
        <div class="wstat-label">Total lost</div>
      </div>
      <div class="wstat">
        <div class="wstat-val" style="color:${changeCol}">${changeStr}</div>
        <div class="wstat-label">vs last</div>
      </div>`;
  } else {
    statsEl.innerHTML = `<div class="wstat" style="grid-column:1/-1;text-align:center;padding:20px"><div style="color:var(--muted);font-size:12px">Log your weight to see stats</div></div>`;
  }

  // Chart
  const chartWrap = document.getElementById('weightChartWrap');
  if (log.length > 1) {
    chartWrap.style.display = 'block';
    drawWeightChart(log);
  } else {
    chartWrap.style.display = 'none';
  }

  // List
  const listEl = document.getElementById('weightLogList');
  if (!log.length) {
    listEl.innerHTML = '<div style="padding:20px 16px;font-size:12px;color:var(--muted)">No entries yet.</div>';
    return;
  }

  const reversed = [...log].reverse();
  listEl.innerHTML = `<h3>Log</h3>` + reversed.map((w,i) => {
    const prev = reversed[i+1];
    const diff = prev ? w.weight - prev.weight : null;
    const diffStr = diff !== null ? (diff > 0 ? `+${diff.toFixed(1)}` : diff.toFixed(1)) : '—';
    const diffCol = diff === null ? 'var(--muted)' : diff < 0 ? 'var(--green)' : 'var(--protein)';
    const d = new Date(w.date + 'T12:00:00');
    return `
      <div class="wlog-row">
        <div class="wlog-date">${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
        <div class="wlog-val">${w.weight.toFixed(1)} kg</div>
        <div class="wlog-diff" style="color:${diffCol}">${diffStr}</div>
      </div>`;
  }).join('');
}

function drawWeightChart(log) {
  const canvas = document.getElementById('weightChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 32;
  const h = 160;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);

  const weights = log.map(e=>e.weight);
  const minW = Math.min(...weights) - 1;
  const maxW = Math.max(...weights) + 1;
  const padL = 32, padR = 12, padT = 10, padB = 24;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;

  const xPos = i => padL + (i / (log.length-1)) * chartW;
  const yPos = v => padT + (1 - (v-minW)/(maxW-minW)) * chartH;

  ctx.clearRect(0,0,w,h);

  // Grid lines
  ctx.strokeStyle = '#2c2e2a';
  ctx.lineWidth = 1;
  for (let i=0;i<4;i++) {
    const y = padT + (i/3)*chartH;
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke();
    const val = maxW - (i/3)*(maxW-minW);
    ctx.fillStyle = '#555';
    ctx.font = '9px DM Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(1), padL-4, y+3);
  }

  // Fill gradient
  const grad = ctx.createLinearGradient(0,padT,0,padT+chartH);
  grad.addColorStop(0, 'rgba(165,214,167,0.25)');
  grad.addColorStop(1, 'rgba(165,214,167,0)');
  ctx.beginPath();
  ctx.moveTo(xPos(0), yPos(weights[0]));
  log.forEach((_,i) => i>0 && ctx.lineTo(xPos(i), yPos(weights[i])));
  ctx.lineTo(xPos(log.length-1), padT+chartH);
  ctx.lineTo(xPos(0), padT+chartH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#a5d6a7';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  log.forEach((e,i) => i===0 ? ctx.moveTo(xPos(i),yPos(e.weight)) : ctx.lineTo(xPos(i),yPos(e.weight)));
  ctx.stroke();

  // Dots
  log.forEach((e,i) => {
    ctx.beginPath();
    ctx.arc(xPos(i), yPos(e.weight), 3, 0, Math.PI*2);
    ctx.fillStyle = '#a5d6a7';
    ctx.fill();
  });
}

// ═══════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════
function loadSettingsUI() {
  const t = getTargets();
  document.getElementById('tCal').value = t.cal;
  document.getElementById('tProt').value = t.prot;
  document.getElementById('tCarbs').value = t.carbs;
  document.getElementById('tFat').value = t.fat;
  const sw = getStartWeight();
  if (sw) document.getElementById('startWeight').value = sw;
}

function saveTargets() {
  const t = {
    cal: parseFloat(document.getElementById('tCal').value)||1600,
    prot: parseFloat(document.getElementById('tProt').value)||150,
    carbs: parseFloat(document.getElementById('tCarbs').value)||130,
    fat: parseFloat(document.getElementById('tFat').value)||55
  };
  saveTargetsStore(t);
  updateMacroStrip();
  showToast('Targets saved ✓');
}

function saveStartWeight() {
  const v = parseFloat(document.getElementById('startWeight').value);
  if (!v) return;
  localStorage.setItem('startweight', v);
  showToast('Starting weight saved ✓');
}

function addPreset() {
  const name = document.getElementById('pName').value.trim();
  const desc = document.getElementById('pDesc').value.trim();
  if (!name) return showToast('Enter a preset name');
  const p = getPresets();
  p.push({name,desc});
  savePresets(p);
  renderPresetList();
  document.getElementById('pName').value='';
  document.getElementById('pDesc').value='';
  showToast('Preset saved ✓');
}

function renderPresetList() {
  const p = getPresets();
  const el = document.getElementById('presetListSettings');
  if (!p.length) { el.innerHTML=''; return; }
  el.innerHTML = p.map((pr,i)=>`
    <div class="wlog-row" style="margin-bottom:4px;background:var(--bg);border-radius:8px;padding:8px 10px">
      <div>
        <div style="font-size:12px;color:var(--text)">${escHtml(pr.name)}</div>
        <div style="font-size:10px;color:var(--muted)">${escHtml(pr.desc)}</div>
      </div>
      <button onclick="deletePreset(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px">×</button>
    </div>`).join('');
}

function deletePreset(i) {
  const p = getPresets(); p.splice(i,1); savePresets(p); renderPresetList();
}

function clearToday() {
  if (confirm("Clear today's food log?")) {
    localStorage.removeItem(todayKey());
    updateMacroStrip();
    const area = document.getElementById('chatArea');
    area.innerHTML='';
    appendAIMessage("Log cleared. What have you eaten today?");
    showToast("Today's log cleared");
  }
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function escHtml(s='') {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
